<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Гарант Сервис | Myrka_1337</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: #1e293b;
            border-radius: 24px;
            padding: 40px 28px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: #14b8a6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
            color: white;
            box-shadow: 0 4px 10px rgba(20, 184, 166, 0.3);
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 32px;
        }
        .telegram-btn {
            background: #14b8a6;
            border-radius: 40px;
            padding: 14px 20px;
            width: 100%;
            border: none;
            color: white;
            font-size: 17px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 24px;
        }
        .telegram-btn:active {
            transform: scale(0.97);
            background: #0d9488;
        }
        .footer-text {
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
        <h1>Гарант Сервис<br>Myrka_1337</h1>
        <div class="subtitle">Безопасные сделки под нашей защитой</div>
        <button class="telegram-btn" onclick="login()"><i class="fab fa-telegram"></i> Войти через Telegram</button>
        <div class="footer-text">Мы гарантируем безопасность 24/7</div>
    </div>
    <script>
        function login() {
            const tg = window.Telegram?.WebApp;
            if (tg) {
                tg.ready();
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    localStorage.setItem('userId', user.id);
                    localStorage.setItem('userName', user.first_name);
                }
            } else {
                localStorage.setItem('userId', 'demo_' + Date.now());
                localStorage.setItem('userName', 'Пользователь');
            }
            window.location.href = 'create-deal.html';
        }
    </script>
</body>
</html>
